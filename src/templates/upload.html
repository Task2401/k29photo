{% extends "base.html" %}
{% block title %}Upload Photo - k29photo{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Upload a Photo</h2>
    {% if albums %}
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="album_id">Select Album</label>
                <select name="album_id" id="album_id" required>
                    <option value="" disabled {% if not selected_album_id %}selected{% endif %}>Choose an album...</option>
                    {% for album in albums %}
                        <option value="{{ album.album_id }}" {% if selected_album_id == album.album_id %}selected{% endif %}>
                            {{ album.album_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="photo">Choose Photo(s)</label>
                <input type="file" id="photo" name="photos" accept="image/jpeg, image/png, image/gif" multiple required class="file-input">
            </div>
            
            <div class="form-group">
                <label for="caption">Caption (Optional)</label>
                <input type="text" id="caption" name="caption" placeholder="Write something about this photo...">
            </div>
            
            <div class="form-group">
                <label for="tags">Tags (separated by space)</label>
                <input type="text" id="tags" name="tags" placeholder="e.g. nature sunset vacation">
            </div>
            
            <button type="submit" class="btn-primary">Upload</button>
        </form>
    {% else %}
        <p class="error-msg">You need to create an album first before uploading photos!</p>
        <div class="create-album-prompt">
            <a href="/create_album" class="btn">Create Album First</a>
        </div>
    {% endif %}
</div>
{% endblock %}
